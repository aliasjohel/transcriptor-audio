<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>AudioTexto</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#101827">

  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <main class="app">

    <header>
      <h1>AudioTexto</h1>
      <p>Transcribí tu voz gratis desde el navegador</p>
    </header>

    <section class="language-box">

  <label for="languageSelect">
    🌎 Idioma del audio
  </label>

  <select id="languageSelect">

    <option value="es-AR">
      Español
    </option>

    <option value="en-US">
      Inglés
    </option>

    <option value="pt-BR">
      Portugués
    </option>

    <option value="fr-FR">
      Francés
    </option>

    <option value="it-IT">
      Italiano
    </option>

  </select>

</section>

    <div class="status" id="status">
      Presioná “Iniciar” y hablá cerca del micrófono.
    </div>

    <section class="controls">
      <button class="primary" id="startBtn">
        🎙️ Iniciar transcripción
      </button>

      <button class="danger" id="stopBtn" disabled>
        ⏹️ Detener
      </button>
    </section>

    <textarea
      id="transcript"
      placeholder="Acá aparecerá la transcripción..."
    ></textarea>

    <section class="tools">

      <button class="secondary" id="copyBtn">
        📋 Copiar
      </button>

      <button class="dark" id="downloadBtn">
        ⬇️ Descargar TXT
      </button>

      <button class="danger" id="clearBtn">
        🗑️ Limpiar
      </button>

    </section>

    <p class="note">
      Primera versión: funciona mejor en Chrome.
    </p>

  </main>

  <script src="js/app.js"></script>

</body>
</html>
